<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🦖 恐龙化石挖掘者 | 挖掘成功</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #3e2a1f 0%, #2c1d12 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; margin: 0; padding: 20px; }
        .game-container { max-width: 1100px; width: 100%; background: #5c3e1f; border-radius: 70px; padding: 20px 25px 30px; box-shadow: 0 25px 40px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        
        /* 挖掘区周围装饰元素 */
        .dino-decor {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            font-size: 2rem;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
        }
        .footprint-1 { top: 30px; left: 20px; transform: rotate(15deg); }
        .footprint-2 { bottom: 25px; right: 20px; transform: rotate(-20deg); }
        .leaf-1 { top: 60px; right: 15px; font-size: 2rem; opacity: 0.7; }
        .leaf-2 { bottom: 60px; left: 10px; font-size: 1.8rem; opacity: 0.6; transform: rotate(30deg); }
        .dino-icon-bg { bottom: 10px; left: 15px; font-size: 2.5rem; opacity: 0.2; transform: rotate(-10deg); position: absolute; pointer-events: none; }
        .dino-icon-bg2 { top: 15px; right: 20px; font-size: 2rem; opacity: 0.2; transform: rotate(15deg); position: absolute; pointer-events: none; }
        
        /* 藤蔓环绕挖掘区边框 */
        .excavation-area {
            background: #7c5a3a;
            padding: 20px;
            border-radius: 56px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 0 4px #e9bc7d, inset 0 0 0 8px #a5713a, 0 15px 20px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
        }
        /* 藤蔓装饰 - 绝对定位围绕边框 */
        .vine-border {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            border-radius: 56px;
            overflow: hidden;
        }
        .vine-leaf {
            position: absolute;
            font-size: 1.6rem;
            color: #5a7a2a;
            text-shadow: 0 0 2px #2c3e1a;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.2));
        }
        /* 左上角藤蔓 */
        .vine-leaf-1 { top: -8px; left: -8px; transform: rotate(-30deg); }
        .vine-leaf-2 { top: 15px; left: 0; transform: rotate(20deg); }
        .vine-leaf-3 { top: 40px; left: -5px; transform: rotate(-15deg); }
        /* 右上角 */
        .vine-leaf-4 { top: -8px; right: -8px; transform: rotate(30deg); }
        .vine-leaf-5 { top: 20px; right: 0; transform: rotate(-20deg); }
        .vine-leaf-6 { top: 45px; right: -5px; transform: rotate(15deg); }
        /* 左下角 */
        .vine-leaf-7 { bottom: -8px; left: -8px; transform: rotate(20deg); }
        .vine-leaf-8 { bottom: 20px; left: 0; transform: rotate(-30deg); }
        .vine-leaf-9 { bottom: 45px; left: -5px; transform: rotate(10deg); }
        /* 右下角 */
        .vine-leaf-10 { bottom: -8px; right: -8px; transform: rotate(-20deg); }
        .vine-leaf-11 { bottom: 20px; right: 0; transform: rotate(30deg); }
        .vine-leaf-12 { bottom: 45px; right: -5px; transform: rotate(-10deg); }
        /* 边缘藤条细线 */
        .vine-stroke {
            position: absolute;
            background: rgba(80,100,40,0.5);
            border-radius: 20px;
        }
        .vine-stroke-top { top: 0; left: 30px; right: 30px; height: 3px; }
        .vine-stroke-bottom { bottom: 0; left: 30px; right: 30px; height: 3px; }
        .vine-stroke-left { top: 30px; left: 0; bottom: 30px; width: 3px; }
        .vine-stroke-right { top: 30px; right: 0; bottom: 30px; width: 3px; }
        
        .canvas-wrapper { background: #5b3c1a; border-radius: 48px; padding: 10px; box-shadow: inset 0 0 0 2px #cf9f5f; position: relative; z-index: 20; }
        canvas { display: block; width: 100%; height: auto; background: #8b5a2b; border-radius: 40px; cursor: pointer; }
        
        /* 右上角工具标签隐藏 */
        .tool-badge { display: none; }
        .game-header { margin-bottom: 20px; padding: 0 10px; position: relative; z-index: 10; }
        h1 { margin: 0; font-size: 1.8rem; background: linear-gradient(135deg, #f7e05e, #c97e2a); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 3px 3px 0 #3b280f; }
        
        .basket-area {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(30,20,10,0.7);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 8px 12px;
            min-width: 140px;
            text-align: center;
            border: 1px solid #e9bc7d;
            z-index: 20;
        }
        .basket-header { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 6px; font-size: 1rem; font-weight: bold; color: #ffdf99; }
        .progress-number { font-size: 1rem; font-weight: bold; color: #ffdf99; }
        .progress-bar-bg { background: #5a3a1a; border-radius: 10px; height: 4px; overflow: hidden; margin: 4px 0; }
        .progress-bar-fill { width: 0%; height: 100%; background: #6f9e3f; border-radius: 10px; transition: width 0.2s; }
        .message-area { background: #2b1d0fcc; backdrop-filter: blur(4px); border-radius: 20px; margin-top: 6px; padding: 3px; text-align: center; font-size: 0.7rem; color: #ffe2aa; }
        .reset-btn { background: #a5662c; border: none; font-size: 0.7rem; font-weight: bold; padding: 3px 6px; width: 100%; border-radius: 20px; color: #fff0bf; cursor: pointer; margin-top: 6px; }
        
        .tool-selector { background: #6b4c2a; padding: 12px 20px; border-radius: 80px; margin-bottom: 20px; display: flex; justify-content: center; gap: 25px; box-shadow: 0 8px 12px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,200,0.3); flex-wrap: wrap; }
        .tool-btn { background: #2c1a0b; border: none; border-radius: 50px; padding: 6px 18px; font-size: 1rem; font-weight: bold; color: #f3bc6c; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: all 0.2s; box-shadow: 0 5px 0 #4a2a10; }
        .tool-btn.active { background: #a5662c; color: #fff0bf; box-shadow: 0 0 0 2px #ffdf99, 0 5px 0 #543a1a; }
        .tool-btn i { font-size: 1.4rem; }
        .tool-range { font-size: 0.65rem; background: #1f1408; padding: 2px 6px; border-radius: 30px; margin-left: 5px; }
        
        /* 骨骼卡片 - 巨无霸 800x800 */
        .bone-card {
            position: fixed;
            pointer-events: none;
            z-index: 10002;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-origin: center;
            animation: bonePop 0.25s cubic-bezier(0.34,1.2,0.64,1) forwards;
            will-change: transform, left, top;
        }
        .bone-card .bone-icon {
            width: 800px;
            height: 800px;
            background: transparent;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: none;
            border: none;
        }
        .bone-card .bone-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        @keyframes bonePop {
            0% { transform: scale(0.2); opacity: 0; }
            60% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .fly-to-basket {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.4s cubic-bezier(0.2,0.9,0.4,1.2);
            width: 300px;
            height: 300px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: transparent;
            box-shadow: none;
            will-change: left, top, width, height, transform;
        }
        .fly-to-basket img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .dig-animation {
            position: fixed;
            pointer-events: none;
            z-index: 10001;
            width: 80px;
            height: 80px;
            animation: digShake 0.6s ease-out forwards;
        }
        .dig-icon {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            animation: digChop 0.6s infinite;
        }
        @keyframes digShake {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0; }
        }
        @keyframes digChop {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(30deg) translateY(8px); }
            100% { transform: rotate(0deg); }
        }
        
        @media (max-width: 800px) {
            .bone-card .bone-icon { width: 600px; height: 600px; }
            .fly-to-basket { width: 240px; height: 240px; }
            .tool-btn { padding: 4px 12px; font-size: 0.8rem; }
            .tool-btn i { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- 背景装饰（非边框） -->
    <div class="dino-decor footprint-1">🐾</div>
    <div class="dino-decor footprint-2">🦖🦴</div>
    <div class="dino-decor leaf-1">🍃</div>
    <div class="dino-decor leaf-2">🌿</div>
    <div class="dino-icon-bg">🦕</div>
    <div class="dino-icon-bg2">🦖</div>

    <div class="game-header">
        <h1>🦖 化石挖掘者 · 丛林挖掘场</h1>
    </div>
    
    <div class="excavation-area">
        <!-- 藤蔓边框装饰 -->
        <div class="vine-border">
            <div class="vine-leaf vine-leaf-1">🍃</div>
            <div class="vine-leaf vine-leaf-2">🌿</div>
            <div class="vine-leaf vine-leaf-3">🍂</div>
            <div class="vine-leaf vine-leaf-4">🍃</div>
            <div class="vine-leaf vine-leaf-5">🌿</div>
            <div class="vine-leaf vine-leaf-6">🍂</div>
            <div class="vine-leaf vine-leaf-7">🍃</div>
            <div class="vine-leaf vine-leaf-8">🌿</div>
            <div class="vine-leaf vine-leaf-9">🍂</div>
            <div class="vine-leaf vine-leaf-10">🍃</div>
            <div class="vine-leaf vine-leaf-11">🌿</div>
            <div class="vine-leaf vine-leaf-12">🍂</div>
            <div class="vine-stroke vine-stroke-top"></div>
            <div class="vine-stroke vine-stroke-bottom"></div>
            <div class="vine-stroke vine-stroke-left"></div>
            <div class="vine-stroke vine-stroke-right"></div>
        </div>
        <div class="canvas-wrapper">
            <canvas id="dirtCanvas" width="700" height="450"></canvas>
        </div>
        <div class="basket-area">
            <div class="basket-header"><span>🧺</span> 化石篮 <span class="progress-number" id="progressCountMobile">0/8</span></div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBarFill"></div></div>
            <div class="message-area" id="gameMessage">点击土层挖掘 | 骨骼原地放大1.5秒后飞入篮子</div>
            <button class="reset-btn" id="resetDigBtn">🔄 重置挖掘</button>
        </div>
    </div>
    
    <div class="tool-selector">
        <button id="toolPick" class="tool-btn active" data-tool="pick" data-radius="85"><i class="fas fa-pickaxe"></i> 镐子 <span class="tool-range">范围85</span></button>
        <button id="toolBrush" class="tool-btn" data-tool="brush" data-radius="70"><i class="fas fa-paintbrush"></i> 刷子 <span class="tool-range">范围70</span></button>
        <button id="toolShovel" class="tool-btn" data-tool="shovel" data-radius="80"><i class="fas fa-shovel"></i> 铲子 <span class="tool-range">范围80</span></button>
    </div>
</div>

<script>
    (function(){
        const FOSSIL_TYPES = [
            { id: "head", name: "头骨", displayName: "头骨", defaultEmoji: "💀" , imageUrl: "dragon/images/head.png"},
            { id: "neck", name: "颈椎", displayName: "颈椎", defaultEmoji: "🦴" , imageUrl: "../images/neck.png" },
            { id: "belly", name: "腹部", displayName: "腹部骨骼", defaultEmoji: "🦴" , imageUrl: "../images/belly.png" },
            { id: "tail", name: "尾巴", displayName: "尾椎骨", defaultEmoji: "🐍" ,  imageUrl: "../images/tail.png" },
            { id: "front_leg_left", name: "左前腿", displayName: "左前腿骨", defaultEmoji: "🦴"  , imageUrl: "../images/front_leg_left.png"},
            { id: "front_leg_right", name: "右前腿", displayName: "右前腿骨", defaultEmoji: "🦴" , imageUrl: "../images/front_leg_right.png" },
            { id: "hind_leg_left", name: "左后腿", displayName: "左后腿骨", defaultEmoji: "🦵" , imageUrl: "../images/hind_leg_left.png" },
            { id: "hind_leg_right", name: "右后腿", displayName: "右后腿骨", defaultEmoji: "🦵"  , imageUrl: "../images/hind_leg_right.png"}
        ];
        const TOTAL_FOSSILS = 8;
        const CANVAS_W = 700, CANVAS_H = 450;
        const TOOLS = {
            pick: { name: "镐子", radius: 85, iconSvg: `url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 42"><path d="M8,8 L26,12 L30,30 L18,38 L6,30 L10,12 Z" fill="%23FFD966" stroke="%236B3A1A" stroke-width="1.5"/><rect x="21" y="9" width="12" height="9" fill="%23B87C48" transform="rotate(20,27,13)"/><circle cx="14" cy="20" r="3.5" fill="%23DEB887"/></svg>')`, emoji: "⛏️" },
            brush: { name: "刷子", radius: 70, iconSvg: `url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 42"><rect x="10" y="8" width="20" height="12" fill="%23C49A6C" stroke="%236B3A1A" stroke-width="1.5"/><rect x="16" y="20" width="8" height="18" fill="%23A55D35"/><path d="M8 10 L28 10" stroke="%23D4A373" stroke-width="2"/><circle cx="18" cy="16" r="2" fill="%23E8C39E"/></svg>')`, emoji: "🖌️" },
            shovel: { name: "铲子", radius: 80, iconSvg: `url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 42"><path d="M18 4 L18 30 L12 36 L24 36 Z" fill="%23C0A080" stroke="%236B3A1A" stroke-width="1.5"/><rect x="14" y="28" width="12" height="6" fill="%238B5A2B"/><circle cx="18" cy="12" r="4" fill="%23DEB887"/></svg>')`, emoji: "🪓" }
        };
        let currentTool = 'pick';
        let currentHitRadius = TOOLS.pick.radius;
        const canvas = document.getElementById('dirtCanvas');
        const ctx = canvas.getContext('2d');
        const resetBtn = document.getElementById('resetDigBtn');
        const gameMessageDiv = document.getElementById('gameMessage');
        const progressCountMobile = document.getElementById('progressCountMobile');
        const progressBarFill = document.getElementById('progressBarFill');
        const toolPickBtn = document.getElementById('toolPick');
        const toolBrushBtn = document.getElementById('toolBrush');
        const toolShovelBtn = document.getElementById('toolShovel');
        
        function setActiveTool(toolId) {
            currentTool = toolId;
            currentHitRadius = TOOLS[toolId].radius;
            [toolPickBtn, toolBrushBtn, toolShovelBtn].forEach(btn => {
                if (btn.dataset.tool === toolId) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            gameMessageDiv.innerHTML = `✨ 已切换到 ${TOOLS[toolId].name}（范围 ${currentHitRadius}）`;
            setTimeout(() => { if (gameActive) gameMessageDiv.innerHTML = '💡 点击土层挖掘'; }, 1500);
        }
        toolPickBtn.addEventListener('click', () => setActiveTool('pick'));
        toolBrushBtn.addEventListener('click', () => setActiveTool('brush'));
        toolShovelBtn.addEventListener('click', () => setActiveTool('shovel'));
        
        let fossils = [];
        let collectedCount = 0;
        let gameActive = true;
        let animationLock = false;
        const DB_NAME = 'DinoFossilDB';
        const STORE_NAME = 'boneImages';
        let db = null;
        let customImages = {};
        let digHoles = [];
        let decorations = [];
        const DECO_COUNT = 80;
        let loadedImages = {};
        
        // ---- 记录挖出的碎片影子（位置+类型ID） ----
        let dugShadows = []; // { x, y, typeId }
        
        // IndexedDB 操作（只读）
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { db = request.result; resolve(db); };
                request.onupgradeneeded = (event) => {
                    const dbRef = event.target.result;
                    if (!dbRef.objectStoreNames.contains(STORE_NAME)) {
                        dbRef.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
            });
        }
        async function loadAllImagesFromDB() {
            if (!db) await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => {
                    const result = {};
                    for (let item of request.result) result[item.id] = item.dataUrl;
                    resolve(result);
                };
                request.onerror = () => reject(request.error);
            });
        }
        
        async function preloadImages() {
            for (let type of FOSSIL_TYPES) {
                const url = customImages[type.id] || type.imageUrl;
                if (url) {
                    const img = new Image();
                    img.src = url;
                    await new Promise(r => { img.onload = r; img.onerror = r; });
                    loadedImages[type.id] = img;
                } else {
                    loadedImages[type.id] = null;
                }
            }
        }
        
        // 游戏绘制（石头、树枝、树叶、坑洞、碎片影子）
        function initDecorations() {
            decorations = [];
            for (let i = 0; i < DECO_COUNT; i++) {
                const type = Math.floor(Math.random() * 3);
                let x = 10 + Math.random() * (CANVAS_W - 20);
                let y = 10 + Math.random() * (CANVAS_H - 20);
                let size = 5 + Math.random() * 12;
                let rotation = Math.random() * Math.PI * 2;
                decorations.push({ type, x, y, size, rotation });
            }
        }
        function drawDecorations() {
            for (let d of decorations) {
                ctx.save();
                ctx.translate(d.x, d.y);
                ctx.rotate(d.rotation);
                ctx.beginPath();
                if (d.type === 0) {
                    ctx.fillStyle = `rgba(70,55,40,0.8)`;
                    ctx.ellipse(0,0,d.size*0.8,d.size*0.6,0,0,Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = `rgba(90,70,50,0.6)`;
                    ctx.ellipse(-2,-2,d.size*0.3,d.size*0.2,0,0,Math.PI*2);
                    ctx.fill();
                } else if (d.type === 1) {
                    ctx.strokeStyle = `rgba(80,50,30,0.9)`;
                    ctx.lineWidth = d.size * 0.3;
                    ctx.beginPath();
                    ctx.moveTo(-d.size*0.5, 0);
                    ctx.lineTo(d.size*0.5, 0);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(d.size*0.3, -d.size*0.2);
                    ctx.lineTo(d.size*0.7, -d.size*0.4);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = `rgba(80,100,40,0.8)`;
                    ctx.beginPath();
                    ctx.ellipse(0,0,d.size*0.6,d.size*0.3,0,0,Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = `rgba(60,80,30,0.9)`;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(d.size*0.4, -d.size*0.2);
                    ctx.lineTo(d.size*0.5, 0);
                    ctx.fill();
                }
                ctx.restore();
            }
        }
        function drawDigHoles() {
            for (let hole of digHoles) {
                ctx.beginPath();
                ctx.arc(hole.x, hole.y, hole.radius, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(100,65,35,0.5)';
                ctx.fill();
            }
        }
        // 绘制挖出的碎片影子 - 放大2倍 (140x140)
        function drawDugShadows() {
            for (let shadow of dugShadows) {
                const img = loadedImages[shadow.typeId];
                if (img && img.complete && img.naturalWidth > 0) {
                    ctx.save();
                    ctx.globalAlpha = 0.3; // 半透明，比之前稍深一点以更明显
                    ctx.drawImage(img, shadow.x - 70, shadow.y - 70, 140, 140);
                    ctx.globalAlpha = 1.0;
                    ctx.restore();
                } else {
                    // 后备简单圆形，半径56
                    ctx.beginPath();
                    ctx.arc(shadow.x, shadow.y, 56, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(200,180,120,0.4)';
                    ctx.fill();
                }
            }
        }
        function drawSoil() {
            const grad = ctx.createLinearGradient(0,0,CANVAS_W,CANVAS_H);
            grad.addColorStop(0,'#9b6a3a');
            grad.addColorStop(1,'#7a4c26');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
            for (let i=0;i<300;i++) {
                ctx.fillStyle = `rgba(70,40,15,${Math.random()*0.45})`;
                ctx.beginPath();
                ctx.arc(Math.random()*CANVAS_W, Math.random()*CANVAS_H, Math.random()*2.5+1,0,Math.PI*2);
                ctx.fill();
            }
            drawDecorations();
            drawDigHoles();
            drawDugShadows();   // 绘制放大的影子
            if (!gameActive && collectedCount===TOTAL_FOSSILS) {
                ctx.font = "bold 28px 'Segoe UI'";
                ctx.fillStyle = "#ffdd99";
                ctx.shadowColor = "gold";
                ctx.fillText("✨ 挖掘成功 ✨", CANVAS_W-180, 55);
                ctx.shadowBlur = 0;
            }
        }
        function renderCanvas() { drawSoil(); }
        
        function updateProgressUI() {
            const percent = (collectedCount / TOTAL_FOSSILS) * 100;
            progressCountMobile.innerText = `${collectedCount}/${TOTAL_FOSSILS}`;
            progressBarFill.style.width = `${percent}%`;
            if (collectedCount === TOTAL_FOSSILS && gameActive) {
                gameActive = false;
                gameMessageDiv.innerHTML = '🎉 恭喜！8块骨骼全部集齐！点击重置继续挖掘 🎉';
            }
        }
        
        function initFossils() {
            const newFossils = [];
            const minDist = 70, margin = 50;
            for (let i = 0; i < TOTAL_FOSSILS; i++) {
                let placed = false;
                for (let tries = 0; tries < 600; tries++) {
                    const x = margin + Math.random() * (CANVAS_W - margin*2);
                    const y = margin + Math.random() * (CANVAS_H - margin*2);
                    let overlap = false;
                    for (let f of newFossils) if (Math.hypot(f.x-x, f.y-y) < minDist) { overlap = true; break; }
                    if (!overlap) {
                        newFossils.push({ id: i, typeId: FOSSIL_TYPES[i].id, x, y, collected: false });
                        placed = true;
                        break;
                    }
                }
                if (!placed) newFossils.push({ id: i, typeId: FOSSIL_TYPES[i].id, x: margin + (i*85)%(CANVAS_W-margin*2), y: margin + Math.floor(i/3)*80, collected: false });
            }
            return newFossils;
        }
        
        function playDigAnimation(x, y) {
            return new Promise(r => {
                let div = document.createElement('div');
                div.className = 'dig-animation';
                div.style.left = x - 40 + 'px';
                div.style.top = y - 40 + 'px';
                let icon = document.createElement('div');
                icon.className = 'dig-icon';
                icon.style.backgroundImage = TOOLS[currentTool].iconSvg;
                div.appendChild(icon);
                for (let i=0;i<2;i++) {
                    let d = document.createElement('div');
                    d.style.position = 'absolute';
                    d.style.width = '5px';
                    d.style.height = '5px';
                    d.style.background = '#c9a87b';
                    d.style.borderRadius = '50%';
                    d.style.left = 20 + Math.random() * 20 + 'px';
                    d.style.top = 20 + Math.random() * 20 + 'px';
                    d.style.animation = 'dustFly 0.6s ease-out forwards';
                    div.appendChild(d);
                }
                document.body.appendChild(div);
                setTimeout(() => { if (div && div.remove) div.remove(); r(); }, 600);
            });
        }
        
        async function showBoneAndFly(clientX, clientY, fossilCanvasX, fossilCanvasY, typeId) {
            const canvasRect = canvas.getBoundingClientRect();
            let img = loadedImages[typeId];
            if (!img || !img.complete || img.naturalWidth === 0) {
                const url = customImages[typeId];
                if (url) {
                    img = new Image();
                    img.src = url;
                    await new Promise(r => { img.onload = r; img.onerror = r; });
                    loadedImages[typeId] = img;
                }
            }
            
            const card = document.createElement('div');
            card.className = 'bone-card';
            if (img && img.complete && img.naturalWidth > 0) {
                const iconDiv = document.createElement('div');
                iconDiv.className = 'bone-icon';
                const cloneImg = img.cloneNode(true);
                iconDiv.appendChild(cloneImg);
                card.appendChild(iconDiv);
            } else {
                const fossil = FOSSIL_TYPES.find(f => f.id === typeId);
                card.style.width = '800px';
                card.style.height = '800px';
                card.style.borderRadius = '50%';
                card.style.display = 'flex';
                card.style.alignItems = 'center';
                card.style.justifyContent = 'center';
                card.style.fontSize = '4rem';
                card.style.background = 'transparent';
                card.textContent = fossil ? fossil.defaultEmoji : '🦴';
            }
            
            let left = clientX - 400;
            let top = clientY - 400;
            const cardWidth = 800, cardHeight = 800;
            if (left < canvasRect.left) left = canvasRect.left + 5;
            if (left + cardWidth > canvasRect.right) left = canvasRect.right - cardWidth - 5;
            if (top < canvasRect.top) top = canvasRect.top + 5;
            if (top + cardHeight > canvasRect.bottom) top = canvasRect.bottom - cardHeight - 5;
            card.style.left = left + 'px';
            card.style.top = top + 'px';
            document.body.appendChild(card);
            await new Promise(r => setTimeout(r, 1500));
            card.remove();
            
            const basket = document.querySelector('.basket-area');
            if (!basket) return;
            const basketRect = basket.getBoundingClientRect();
            const targetX = basketRect.left + basketRect.width * 0.7;
            const targetY = basketRect.top + 30;
            const flyer = document.createElement('div');
            flyer.className = 'fly-to-basket';
            if (img && img.complete && img.naturalWidth > 0) {
                const flyImg = img.cloneNode(true);
                flyer.appendChild(flyImg);
            } else {
                const fossil = FOSSIL_TYPES.find(f => f.id === typeId);
                flyer.style.fontSize = '3rem';
                flyer.style.display = 'flex';
                flyer.style.alignItems = 'center';
                flyer.style.justifyContent = 'center';
                flyer.textContent = fossil ? fossil.defaultEmoji : '🦴';
            }
            flyer.style.left = left + 250 + 'px';
            flyer.style.top = top + 250 + 'px';
            document.body.appendChild(flyer);
            flyer.style.left = targetX - 150 + 'px';
            flyer.style.top = targetY - 150 + 'px';
            flyer.style.transform = 'scale(0.6) rotate(20deg)';
            await new Promise(resolve => {
                flyer.addEventListener('transitionend', () => resolve(), { once: true });
                setTimeout(resolve, 400);
            });
            flyer.remove();
        }
        
        async function onDig(canvasX, canvasY, clientX, clientY) {
            if (!gameActive || animationLock) return;
            animationLock = true;
            gameMessageDiv.innerHTML = `🔨 用${TOOLS[currentTool].name}挖掘中...`;
            await playDigAnimation(clientX, clientY);
            const radius = 26 + Math.random() * 6;
            digHoles.push({ x: canvasX, y: canvasY, radius: radius });
            if (digHoles.length > 120) digHoles.shift();
            
            let closest = null, minDist = currentHitRadius + 1;
            for (let f of fossils) {
                if (f.collected) continue;
                const d = Math.hypot(f.x - canvasX, f.y - canvasY);
                if (d < minDist) {
                    minDist = d;
                    closest = f;
                }
            }
            if (closest && !closest.collected) {
                closest.collected = true;
                collectedCount++;
                // 记录影子：在挖出位置留下半透明骨骼痕迹（坐标使用挖出的 canvas 坐标）
                dugShadows.push({ x: canvasX, y: canvasY, typeId: closest.typeId });
                if (dugShadows.length > 80) dugShadows.shift();
                updateProgressUI();
                await showBoneAndFly(clientX, clientY, closest.x, closest.y, closest.typeId);
                renderCanvas();
                if (collectedCount === TOTAL_FOSSILS) gameActive = false;
                else gameMessageDiv.innerHTML = `🦴 用${TOOLS[currentTool].name}挖到了${FOSSIL_TYPES.find(t=>t.id===closest.typeId).displayName}！`;
            } else {
                renderCanvas();
                gameMessageDiv.innerHTML = `⛏️ 用${TOOLS[currentTool].name}挖开泥土，没有化石`;
            }
            setTimeout(() => { if (gameActive) gameMessageDiv.innerHTML = '💡 点击土层挖掘'; }, 1500);
            animationLock = false;
        }
        
        function handleClick(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            if (canvasX >= 0 && canvasX <= CANVAS_W && canvasY >= 0 && canvasY <= CANVAS_H) {
                onDig(canvasX, canvasY, clientX, clientY);
            }
        }
        
        function resetGame() {
            document.querySelectorAll('.bone-card, .fly-to-basket, .dig-animation').forEach(el => el.remove());
            fossils = initFossils();
            collectedCount = 0;
            gameActive = true;
            digHoles = [];
            dugShadows = [];   // 清除所有影子
            initDecorations();
            updateProgressUI();
            gameMessageDiv.innerHTML = '⛏️ 全新化石层！选择工具开始挖掘 ⛏️';
            renderCanvas();
        }
        
        async function init() {
            await openDB();
            customImages = await loadAllImagesFromDB();
            await preloadImages();
            fossils = initFossils();
            collectedCount = 0;
            gameActive = true;
            digHoles = [];
            dugShadows = [];
            initDecorations();
            renderCanvas();
            updateProgressUI();
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(e); });
            resetBtn.addEventListener('click', resetGame);
            const style = document.createElement('style');
            style.textContent = `@keyframes dustFly { 0% { transform: scale(0); opacity: 0.8; } 100% { transform: scale(1.5) translate(10px,-15px); opacity: 0; } }`;
            document.head.appendChild(style);
        }
        
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;
        init();
    })();
</script>
</body>
</html>
